<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&display=swap"
    rel="stylesheet"
  />
  <title>Malgieri OS</title>

  <style>
    :root {
      --bg1: #020617;
      --bg2: #0f172a;
      --bg3: #000000;

      --white: #ffffff;
      --white90: rgba(255, 255, 255, 0.9);
      --white75: rgba(255, 255, 255, 0.75);
      --white70: rgba(255, 255, 255, 0.7);
      --white60: rgba(255, 255, 255, 0.6);
      --white50: rgba(255, 255, 255, 0.5);
      --white15: rgba(255, 255, 255, 0.15);
      --white10: rgba(255, 255, 255, 0.1);
      --white05: rgba(255, 255, 255, 0.05);

      --cyan: #67e8f9;
      --cyan2: #22d3ee;
      --blue: #3b82f6;
      --violet: #8b5cf6;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: white;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      min-height: 100dvh;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    .app-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: scale(1.01);
      animation: pageIn 0.35s ease forwards;
      transition: transform 0.55s ease, filter 0.55s ease, opacity 0.55s ease;
      will-change: transform, filter, opacity;
    }

    @keyframes pageIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    body.app-transition .app-shell {
      transform: scale(0.965);
      filter: blur(10px) brightness(0.9);
      opacity: 0.72;
    }

    .topbar {
      height: calc(52px + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      border-bottom: 1px solid var(--white10);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .top-title {
      font-weight: 700;
      color: var(--white90);
      white-space: nowrap;
    }

    .top-subtitle {
      color: var(--white50);
      font-size: 13px;
      white-space: nowrap;
    }

    .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
      flex-shrink: 0;
    }

    .clock {
      color: var(--white60);
      font-size: 14px;
      white-space: nowrap;
    }

    .desktop {
      flex: 1;
      padding: 24px 18px 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .grid {
      width: 100%;
      max-width: 840px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 132px));
      justify-content: center;
      gap: 24px;
      padding-bottom: 28px;
    }

    .icon {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--white10);
      border-radius: 24px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 156px;
      cursor: pointer;
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        opacity 0.25s ease;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
      text-decoration: none;
      color: inherit;
      will-change: transform, opacity, box-shadow;
      overflow: hidden;
    }

    .icon:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .badge {
      width: 84px;
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--white10);
      font-size: 40px;
      flex-shrink: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      will-change: transform, box-shadow;
    }

    .icon:hover .badge {
      transform: scale(1.05);
    }

    .label {
      font-size: 15px;
      text-align: center;
      color: var(--white90);
      font-weight: 600;
      line-height: 1.3;
    }

    .dock-wrap {
      position: sticky;
      bottom: 0;
      z-index: 15;
      padding: 10px 12px calc(14px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0));
    }

    .dock {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--white10);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      color: var(--white70);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    .dock::-webkit-scrollbar {
      display: none;
    }

    /* Icon launch */
    .icon.app-launching {
      z-index: 1000;
      transform: translateY(-6px) scale(1.05);
      border-color: rgba(103, 232, 249, 0.75);
      box-shadow:
        0 0 0 1px rgba(103, 232, 249, 0.35),
        0 0 28px rgba(103, 232, 249, 0.22),
        0 24px 70px rgba(0, 0, 0, 0.55);
      animation: iconBlast 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .icon.app-launching .badge {
      box-shadow:
        0 0 18px rgba(103, 232, 249, 0.45),
        0 0 45px rgba(59, 130, 246, 0.25);
      animation: badgeBlast 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    }

    @keyframes iconBlast {
      0% {
        opacity: 1;
        transform: translateY(-2px) scale(1.02);
      }
      22% {
        opacity: 1;
        transform: translateY(-10px) scale(1.08);
      }
      100% {
        opacity: 0;
        transform: scale(2.8);
      }
    }

    @keyframes badgeBlast {
      0% {
        transform: scale(1);
      }
      22% {
        transform: scale(1.12);
      }
      100% {
        transform: scale(1.55);
      }
    }

    /* Fullscreen launch overlay */
    .launch {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.12);
      background:
        radial-gradient(circle at center, rgba(103, 232, 249, 0.38), transparent 12%),
        radial-gradient(circle at center, rgba(59, 130, 246, 0.26), transparent 24%),
        linear-gradient(135deg, #020617, #0f172a, #000);
      transition: opacity 0.42s ease, transform 0.9s ease;
      overflow: hidden;
      will-change: transform, opacity;
    }

    .launch.active {
      opacity: 1;
      transform: scale(1);
    }

    .launch::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at center, rgba(103, 232, 249, 0.16), transparent 26%);
      opacity: 0;
    }

    .launch.active::before {
      animation: launchBloom 1.15s ease-out forwards;
    }

    @keyframes launchBloom {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      28% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.8);
      }
    }

    .launch::after {
      content: "LAUNCHING SCOTT'S SPACE";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.74);
      font-family: "Orbitron", Arial, sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1.38;
      width: min(92vw, 760px);
      text-align: center;
      color: var(--white);
      opacity: 0;
      text-shadow:
        0 0 12px rgba(103, 232, 249, 0.95),
        0 0 30px rgba(59, 130, 246, 0.85),
        0 0 60px rgba(139, 92, 246, 0.35);
      transition: opacity 0.22s ease 0.06s, transform 0.6s cubic-bezier(.2,.8,.2,1) 0.06s;
      will-change: transform, opacity;
    }

    .launch.active::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .launch-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.22);
      border: 2px solid rgba(103, 232, 249, 0.98);
      box-shadow:
        0 0 28px rgba(103, 232, 249, 0.85),
        0 0 80px rgba(59, 130, 246, 0.5),
        inset 0 0 26px rgba(103, 232, 249, 0.18);
      opacity: 0;
      will-change: transform, opacity;
    }

    .launch.active .launch-ring {
      animation: ringExpand 1s cubic-bezier(.2,.8,.2,1) forwards;
    }

    @keyframes ringExpand {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.16);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(4.2);
      }
    }

    .launch-pulse {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.1);
      background: radial-gradient(
        circle,
        rgba(255,255,255,1) 0%,
        rgba(103,232,249,0.98) 22%,
        rgba(59,130,246,0.58) 48%,
        transparent 72%
      );
      filter: blur(1px);
      opacity: 0;
      will-change: transform, opacity;
    }

    .launch.active .launch-pulse {
      animation: centerPulse 0.9s cubic-bezier(.2,.8,.2,1) forwards;
    }

    @keyframes centerPulse {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(11);
      }
    }

    .launch-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.16), transparent 28%);
      opacity: 0;
      mix-blend-mode: screen;
    }

    .launch.active .launch-flash {
      animation: flashFade 0.75s ease-out forwards;
    }

    @keyframes flashFade {
      0% {
        opacity: 0;
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    @media (max-width: 760px) {
      .top-subtitle {
        display: none;
      }

      .desktop {
        padding: 20px 14px 0;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: none;
        gap: 14px;
      }

      .icon {
        min-height: 138px;
        border-radius: 20px;
        padding: 12px 10px;
      }

      .badge {
        width: 68px;
        height: 68px;
        border-radius: 22px;
        font-size: 32px;
      }

      .label {
        font-size: 13px;
      }

      .dock {
        justify-content: flex-start;
      }

      .launch::after {
        width: min(84vw, 360px);
        font-size: 24px;
        letter-spacing: 0.1em;
        line-height: 1.45;
      }

      .launch-ring {
        width: 150px;
        height: 150px;
      }

      .launch-pulse {
        width: 44px;
        height: 44px;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .desktop {
        padding: 18px 12px 0;
      }

      .grid {
        gap: 12px;
      }

      .icon {
        min-height: 132px;
      }

      .dock {
        gap: 14px;
        padding: 12px 14px;
      }

      .launch::after {
        font-size: 20px;
        width: 82vw;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="top-left">
        <div class="status"></div>
        <div class="top-title">Malgieri OS</div>
        <div class="top-subtitle">Desktop</div>
      </div>
      <div id="clock" class="clock"></div>
    </div>

    <div class="desktop">
      <div class="grid">
        <div id="scott" class="icon">
          <div class="badge">💻</div>
          <div class="label">Scott's Space</div>
        </div>

        <div class="icon">
          <div class="badge">💖</div>
          <div class="label">Courtney's Corner</div>
        </div>

        <div class="icon">
          <div class="badge">🐶</div>
          <div class="label">Obi's Observatory</div>
        </div>

        <div class="icon">
          <div class="badge">🍼</div>
          <div class="label">Jaxson's Journey</div>
        </div>

        <div class="icon">
          <div class="badge">🦴</div>
          <div class="label">Obi Treat</div>
        </div>
      </div>
    </div>

    <div class="dock-wrap">
      <div class="dock">
        <span>Apps</span>
        <span>Browser</span>
        <span>Photos</span>
        <span>Music</span>
        <span>Settings</span>
      </div>
    </div>
  </div>

  <div id="launch" class="launch">
    <div class="launch-ring"></div>
    <div class="launch-pulse"></div>
    <div class="launch-flash"></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    const scott = document.getElementById("scott");
    const launch = document.getElementById("launch");

    function startScottLaunch() {
      document.body.classList.add("app-transition");
      scott.classList.add("app-launching");

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          launch.classList.add("active");

          setTimeout(() => {
            window.location.href = "Scott.html";
          }, 1200);
        });
      });
    }

    scott.addEventListener("click", startScottLaunch);

    window.addEventListener("pageshow", () => {
      document.body.classList.remove("app-transition");
      launch.classList.remove("active");
      scott.classList.remove("app-launching");
    });
  </script>
</body>
</html>
