<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<title>Malgieri OS</title>

<style>

:root{
--bg1:#020617;
--bg2:#0f172a;
--bg3:#000;

--white60:rgba(255,255,255,0.6);
--white50:rgba(255,255,255,0.5);
--white10:rgba(255,255,255,0.1);

--cyan:#67e8f9;

--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
min-height:100%;

font-family:Arial,Helvetica,sans-serif;

background:
radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 30%),
linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));

color:white;
overflow:hidden;
}

body{
min-height:100dvh;
padding-left:var(--safe-left);
padding-right:var(--safe-right);
}

/* screens */

.screen{
position:fixed;
inset:0;

display:none;
align-items:center;
justify-content:center;
text-align:center;

padding:28px;
padding-top:calc(28px + var(--safe-top));
padding-bottom:calc(28px + var(--safe-bottom));
}

.screen.active{
display:flex;
}

/* power */

.power-ring{
width:150px;
height:150px;

border-radius:50%;
border:1px solid rgba(255,255,255,0.15);

display:flex;
align-items:center;
justify-content:center;

margin:0 auto 28px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(16px);
}

.power-button{
width:95px;
height:95px;

border-radius:50%;

border:1px solid rgba(34,211,238,0.4);
background:rgba(34,211,238,0.18);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.25s;
}

.power-button:hover{
transform:scale(1.05);
}

.power-icon{
width:40px;
height:40px;

border:4px solid var(--cyan);
border-top-color:transparent;

border-radius:50%;
position:relative;
}

.power-icon:before{
content:"";
position:absolute;
left:50%;
top:-8px;

transform:translateX(-50%);

width:4px;
height:18px;

background:var(--cyan);
}

/* text */

.title{
font-family:"Orbitron";
font-size:clamp(32px,6vw,48px);
font-weight:800;
}

.subtitle{
margin-top:10px;
color:var(--white60);
}

/* loading */

.loader{
width:42px;
height:42px;

border-radius:50%;

border:4px solid rgba(125,211,252,0.18);
border-top-color:var(--cyan);

animation:spin 1s linear infinite;

margin:0 auto 18px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.progress{
margin-top:24px;
height:14px;
border-radius:999px;

border:1px solid var(--white10);
background:rgba(255,255,255,0.05);

overflow:hidden;
}

.bar{
height:100%;
width:0%;

background:linear-gradient(90deg,#22d3ee,#3b82f6,#8b5cf6);

transition:.1s linear;
}

.status{
margin-top:14px;
font-size:14px;
color:var(--white50);
}

/* launch */

.launch{
position:fixed;
inset:0;

z-index:9999;

pointer-events:none;

opacity:0;
transform:scale(1.05);

background:
radial-gradient(circle at center, rgba(103,232,249,0.25), transparent 20%),
radial-gradient(circle at center, rgba(59,130,246,0.18), transparent 40%),
linear-gradient(135deg,#020617,#0f172a,#000);

transition:opacity .55s ease, transform .7s ease;
}

.launch.active{
opacity:1;
transform:scale(1);
}

.launch:after{
content:"LAUNCHING DESKTOP";

position:absolute;
left:50%;
top:50%;

transform:translate(-50%,-50%);

font-family:"Orbitron";
font-size:clamp(20px,4vw,32px);
font-weight:800;

letter-spacing:0.12em;

opacity:0;

text-shadow:
0 0 10px rgba(103,232,249,0.75),
0 0 24px rgba(59,130,246,0.40);

transition:.3s .2s;
}

.launch.active:after{
opacity:1;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bootSound" preload="auto">
<source src="boot.mp3" type="audio/mpeg">
</audio>

<!-- POWER -->
<section id="power" class="screen active">

<div>

<div class="power-ring">
<div id="powerBtn" class="power-button">
<div class="power-icon"></div>
</div>
</div>

<div class="title">Malgieri OS</div>
<div class="subtitle">Press Power to Load Into The System</div>

</div>

</section>

<!-- LOADING -->
<section id="loading" class="screen">

<div>

<div class="loader"></div>
<div class="title" style="font-size:28px;">Booting Malgieri OS</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="status" class="status">Initializing System...</div>

</div>

</section>

<!-- LAUNCH -->
<div id="launch" class="launch"></div>

<script>

const powerBtn = document.getElementById("powerBtn")
const power = document.getElementById("power")
const loading = document.getElementById("loading")

const bar = document.getElementById("bar")
const status = document.getElementById("status")

const launch = document.getElementById("launch")
const bootSound = document.getElementById("bootSound")

const messages = [
"Initializing System...",
"Loading Desktop Environment...",
"Starting Scott's Space...",
"Communicating With Courtney's Corner...",
"Starting Services...",
"Launching Desktop..."
]

powerBtn.onclick = () => {

if(bootSound){
bootSound.currentTime = 0
bootSound.volume = 1
bootSound.play().catch(()=>{})
}

power.classList.remove("active")
loading.classList.add("active")

let progress = 0
let msg = 0

const totalTime = 6000
const intervalTime = 50
const steps = totalTime / intervalTime
const increment = 100 / steps

const interval = setInterval(()=>{

progress += increment

if(progress > 100) progress = 100

bar.style.width = progress + "%"

if(Math.floor(progress) % 18 === 0 && msg < messages.length - 1){
msg++
status.textContent = messages[msg]
}

if(progress >= 100){

clearInterval(interval)

/* 🔊 FADE OUT SOUND */
let fade = setInterval(()=>{
if(bootSound.volume > 0.05){
bootSound.volume -= 0.05
}else{
bootSound.pause()
clearInterval(fade)
}
},80)

setTimeout(()=>{

launch.classList.add("active")

setTimeout(()=>{
window.location.href = "home.html"
},900)

},300)

}

}, intervalTime)

}

</script>

</body>
</html>
