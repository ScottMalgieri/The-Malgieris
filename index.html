<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#020617"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Malgieri OS</title>

<style>

:root{
--bg1:#020617;
--bg2:#0f172a;
--bg3:#000000;
--white:#ffffff;
--white60:rgba(255,255,255,0.6);
--white40:rgba(255,255,255,0.4);
--cyan:#67e8f9;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
height:100%;
font-family:Arial,Helvetica,sans-serif;
background:
radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 30%),
linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
color:white;
overflow:hidden;
}

.screen{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:30px;
}

.hidden{
display:none;
}

.power-ring{
width:150px;
height:150px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.15);
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
margin-bottom:30px;
}

.power-button{
width:95px;
height:95px;
border-radius:50%;
border:1px solid rgba(34,211,238,0.4);
background:rgba(34,211,238,0.15);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.25s;
}

.power-button:hover{
transform:scale(1.08);
background:rgba(34,211,238,0.25);
}

.power-icon{
width:40px;
height:40px;
border:4px solid var(--cyan);
border-top-color:transparent;
border-radius:50%;
position:relative;
}

.power-icon:before{
content:"";
position:absolute;
top:-9px;
left:50%;
transform:translateX(-50%);
width:4px;
height:18px;
background:var(--cyan);
border-radius:2px;
}

.title{
font-size:40px;
font-weight:700;
letter-spacing:0.04em;
}

.subtitle{
margin-top:10px;
color:var(--white60);
}

.loader{
width:44px;
height:44px;
border-radius:50%;
border:4px solid rgba(125,211,252,0.2);
border-top-color:var(--cyan);
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.progress{
width:260px;
height:12px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.15);
overflow:hidden;
margin-top:25px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22d3ee,#3b82f6,#8b5cf6);
transition:width .2s linear;
}

.status{
margin-top:15px;
font-size:14px;
color:var(--white40);
}

</style>
</head>

<body>

<!-- POWER SCREEN -->
<div id="powerScreen" class="screen">
<div class="power-ring">
<div class="power-button" id="powerButton">
<div class="power-icon"></div>
</div>
</div>

<div class="title">Malgieri OS</div>
<div class="subtitle">Press power to boot the system</div>
</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen hidden">

<div class="loader"></div>

<div class="title" style="font-size:28px;">Booting Malgieri OS</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status">Initializing system...</div>

</div>

<script>

const powerButton = document.getElementById("powerButton")
const powerScreen = document.getElementById("powerScreen")
const loadingScreen = document.getElementById("loadingScreen")
const bar = document.getElementById("bar")
const status = document.getElementById("status")

const messages=[
"Initializing system...",
"Loading desktop environment...",
"Connecting Scott's Space...",
"Preparing family apps...",
"Starting services...",
"Launching desktop..."
]

powerButton.onclick=()=>{
powerScreen.classList.add("hidden")
loadingScreen.classList.remove("hidden")

let progress=0
let msgIndex=0

const interval=setInterval(()=>{

progress+=2
bar.style.width=progress+"%"

if(progress%18===0 && msgIndex<messages.length-1){
msgIndex++
status.textContent=messages[msgIndex]
}

if(progress>=100){
clearInterval(interval)

setTimeout(()=>{
window.location.href="home.html"
},300)

}

},80)

}

</script>

</body>
</html>
