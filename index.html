<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Malgieri OS</title>

  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --bg-3: #000000;
      --white: #ffffff;
      --white-70: rgba(255,255,255,0.70);
      --white-60: rgba(255,255,255,0.60);
      --white-50: rgba(255,255,255,0.50);
      --white-15: rgba(255,255,255,0.15);
      --white-10: rgba(255,255,255,0.10);
      --white-05: rgba(255,255,255,0.05);
      --cyan: #67e8f9;
      --cyan-soft: rgba(34, 211, 238, 0.14);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 26%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      color: var(--white);
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      padding-top: calc(28px + var(--safe-top));
      padding-bottom: calc(28px + var(--safe-bottom));
      overflow: hidden;
    }

    .screen.active {
      display: flex;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 26%);
      pointer-events: none;
    }

    .center-wrap {
      position: relative;
      z-index: 2;
      width: min(92vw, 640px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .power-ring {
      width: 150px;
      height: 150px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--white-15);
      background: var(--white-05);
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(59,130,246,0.18);
    }

    .power-button {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.40);
      background: var(--cyan-soft);
      color: var(--cyan);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 rgba(103,232,249,0);
    }

    .power-button:hover {
      transform: scale(1.05);
      background: rgba(34, 211, 238, 0.20);
      box-shadow: 0 0 24px rgba(103,232,249,0.18);
    }

    .power-icon {
      width: 40px;
      height: 40px;
      border: 4px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      position: relative;
    }

    .power-icon::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -8px;
      transform: translateX(-50%);
      width: 4px;
      height: 18px;
      border-radius: 999px;
      background: currentColor;
    }

    .title {
      font-size: clamp(36px, 6vw, 50px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--white-60);
      font-size: 18px;
      line-height: 1.5;
      max-width: 520px;
    }

    .loader-shell {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--white-10);
      background: var(--white-05);
      backdrop-filter: blur(16px);
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(125, 211, 252, 0.18);
      border-top-color: var(--cyan);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 600;
      line-height: 1.1;
    }

    .loading-text {
      margin-top: 12px;
      color: var(--white-60);
      font-size: 18px;
      line-height: 1.5;
    }

    .loading-status {
      margin-top: 18px;
      min-height: 22px;
      color: var(--white-50);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .progress-shell {
      margin-top: 28px;
      width: min(420px, 100%);
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--white-10);
      background: var(--white-05);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #3b82f6, #8b5cf6);
      box-shadow: 0 0 26px rgba(59,130,246,0.35);
      transition: width 0.18s linear;
    }

    @media (max-width: 640px) {
      body {
        min-height: 100dvh;
      }

      .screen {
        min-height: 100dvh;
        padding: 22px;
        padding-top: calc(22px + var(--safe-top));
        padding-bottom: calc(22px + var(--safe-bottom));
      }

      .power-ring {
        width: 132px;
        height: 132px;
        margin-bottom: 26px;
      }

      .power-button {
        width: 88px;
        height: 88px;
      }

      .power-icon {
        width: 36px;
        height: 36px;
      }

      .subtitle,
      .loading-text {
        font-size: 16px;
      }

      .loading-status {
        font-size: 13px;
      }

      .progress-shell {
        margin-top: 24px;
      }
    }
  </style>
</head>
<body>
  <section id="power-screen" class="screen active">
    <div class="center-wrap">
      <div class="power-ring">
        <button id="power-button" class="power-button" aria-label="Power on Malgieri OS">
          <span class="power-icon" aria-hidden="true"></span>
        </button>
      </div>
      <div class="title">Malgieri OS</div>
      <div class="subtitle">Press Power To Boot The System.</div>
    </div>
  </section>

  <section id="loading-screen" class="screen">
    <div class="center-wrap">
      <div class="loader-shell">
        <div class="spinner"></div>
      </div>
      <div class="loading-title">Booting Malgieri OS</div>
      <div class="loading-text">Loading Apps and Desktop Environment...</div>
      <div id="loading-status" class="loading-status">Initializing System...</div>
      <div class="progress-shell">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
  </section>

  <script>
    const powerScreen = document.getElementById("power-screen");
    const loadingScreen = document.getElementById("loading-screen");
    const powerButton = document.getElementById("power-button");
    const progressBar = document.getElementById("progress-bar");
    const loadingStatus = document.getElementById("loading-status");

    const statuses = [
      "Initializing System...",
      "Loading Desktop Environment...",
      "Connecting To Scott's Space...",
      "Preparing Courtney's Corner...",
      "Starting Services...",
      "Launching desktop..."
    ];

    let statusIndex = 0;
    let statusTimer = null;

    function showScreen(name) {
      powerScreen.classList.remove("active");
      loadingScreen.classList.remove("active");

      if (name === "power") powerScreen.classList.add("active");
      if (name === "loading") loadingScreen.classList.add("active");
    }

    function bootSystem() {
      showScreen("loading");
      progressBar.style.width = "0%";
      statusIndex = 0;
      loadingStatus.textContent = statuses[0];

      const bootLength = 5000;
      const start = performance.now();

      if (statusTimer) clearInterval(statusTimer);
      statusTimer = setInterval(() => {
        statusIndex = Math.min(statusIndex + 1, statuses.length - 1);
        loadingStatus.textContent = statuses[statusIndex];
      }, 850);

      function animate(now) {
        const elapsed = now - start;
        const percent = Math.min((elapsed / bootLength) * 100, 100);
        progressBar.style.width = percent + "%";

        if (elapsed < bootLength) {
          requestAnimationFrame(animate);
        } else {
          clearInterval(statusTimer);
          loadingStatus.textContent = "Desktop ready.";
          setTimeout(() => {
            window.location.href = "home.html";
          }, 250);
        }
      }

      requestAnimationFrame(animate);
    }

    powerButton.addEventListener("click", bootSystem);
  </script>
</body>
</html>
