<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet"
  />
  <title>Malgieri OS</title>

  <style>
    :root {
      --bg1: #020617;
      --bg2: #0f172a;
      --bg3: #000000;

      --white: #ffffff;
      --white90: rgba(255, 255, 255, 0.9);
      --white75: rgba(255, 255, 255, 0.75);
      --white70: rgba(255, 255, 255, 0.7);
      --white60: rgba(255, 255, 255, 0.6);
      --white50: rgba(255, 255, 255, 0.5);
      --white10: rgba(255, 255, 255, 0.1);
      --white05: rgba(255, 255, 255, 0.05);

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    }

    body {
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    .app-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: scale(1.01);
      animation: pageIn 0.35s ease forwards;
      transition: filter 0.5s ease, opacity 0.5s ease, transform 0.5s ease;
      will-change: transform, filter, opacity;
    }

    @keyframes pageIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    body.app-transition .app-shell {
      transform: scale(0.965);
      filter: blur(10px) brightness(0.9);
      opacity: 0.72;
    }

    body.shutdown-transition .app-shell {
      filter: blur(8px) brightness(0.55);
      opacity: 0.2;
    }

    .topbar {
      height: calc(54px + var(--safe-top));
      padding-top: var(--safe-top);
      padding-left: calc(16px + var(--safe-left));
      padding-right: calc(16px + var(--safe-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--white10);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 12px #4ade80;
      flex-shrink: 0;
    }

    .top-title {
      font-weight: 700;
      color: var(--white90);
      font-size: 15px;
      white-space: nowrap;
    }

    .clock {
      color: var(--white60);
      font-size: 14px;
      white-space: nowrap;
    }

    .desktop {
      flex: 1;
      padding: 24px 18px 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .desktop-inner {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-box {
      width: 100%;
      margin-bottom: 22px;
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--white10);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .status-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--white70);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }

    .status-content {
      font-size: 16px;
      color: var(--white90);
      font-weight: 600;
    }

    .arrival-status {
      font-family: "Orbitron", Arial, sans-serif;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #f87171;
      text-shadow:
        0 0 8px rgba(248, 113, 113, 0.75),
        0 0 18px rgba(248, 113, 113, 0.45);
      animation: unbornPulse 2.6s ease-in-out infinite;
      will-change: transform, text-shadow, opacity;
    }

    @keyframes unbornPulse {
      0%,
      100% {
        opacity: 0.9;
        transform: scale(1);
        text-shadow:
          0 0 8px rgba(248, 113, 113, 0.70),
          0 0 18px rgba(248, 113, 113, 0.40),
          0 0 28px rgba(239, 68, 68, 0.18);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
        text-shadow:
          0 0 12px rgba(248, 113, 113, 0.95),
          0 0 28px rgba(248, 113, 113, 0.70),
          0 0 44px rgba(239, 68, 68, 0.35);
      }
    }

    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 160px));
      justify-content: center;
      gap: 22px;
      padding-bottom: 22px;
    }

    .icon {
      position: relative;
      min-height: 170px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--white10);
      border-radius: 28px;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        opacity 0.25s ease;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
      color: inherit;
      overflow: hidden;
      will-change: transform, opacity, box-shadow;
    }

    .icon:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .badge {
      width: 92px;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--white10);
      font-size: 42px;
      flex-shrink: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      will-change: transform, box-shadow;
    }

    .icon:hover .badge {
      transform: scale(1.05);
    }

    .label {
      font-size: 15px;
      text-align: center;
      color: var(--white90);
      font-weight: 600;
      line-height: 1.3;
    }

    .shutdown-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 4px 0 18px;
    }

    .shutdown-btn {
      border: 1px solid rgba(248, 113, 113, 0.28);
      background: rgba(248, 113, 113, 0.08);
      color: var(--white90);
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }

    .shutdown-btn:hover {
      transform: translateY(-2px);
      background: rgba(248, 113, 113, 0.14);
      border-color: rgba(248, 113, 113, 0.4);
    }

    .shutdown-icon {
      width: 18px;
      height: 18px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      position: relative;
      display: inline-block;
      flex-shrink: 0;
    }

    .shutdown-icon::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -5px;
      transform: translateX(-50%);
      width: 2px;
      height: 9px;
      border-radius: 999px;
      background: currentColor;
    }

    .dock-wrap {
      position: sticky;
      bottom: 0;
      z-index: 15;
      padding: 10px 12px calc(14px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0));
    }

    .dock {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--white10);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      color: var(--white70);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    .dock::-webkit-scrollbar {
      display: none;
    }

    /* Scott launch */
    .icon.app-launching {
      z-index: 1000;
      transform: translateY(-6px) scale(1.05);
      border-color: rgba(103, 232, 249, 0.75);
      box-shadow:
        0 0 0 1px rgba(103, 232, 249, 0.35),
        0 0 28px rgba(103, 232, 249, 0.22),
        0 24px 70px rgba(0, 0, 0, 0.55);
      animation: iconBlast 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .icon.app-launching .badge {
      box-shadow:
        0 0 18px rgba(103, 232, 249, 0.45),
        0 0 45px rgba(59, 130, 246, 0.25);
      animation: badgeBlast 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    }

    @keyframes iconBlast {
      0% { opacity: 1; transform: translateY(-2px) scale(1.02); }
      22% { opacity: 1; transform: translateY(-10px) scale(1.08); }
      100% { opacity: 0; transform: scale(2.8); }
    }

    @keyframes badgeBlast {
      0% { transform: scale(1); }
      22% { transform: scale(1.12); }
      100% { transform: scale(1.55); }
    }

    .launch {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.12);
      background:
        radial-gradient(circle at center, rgba(103, 232, 249, 0.38), transparent 12%),
        radial-gradient(circle at center, rgba(59, 130, 246, 0.26), transparent 24%),
        linear-gradient(135deg, #020617, #0f172a, #000);
      transition: opacity 0.42s ease, transform 0.9s ease;
      overflow: hidden;
    }

    .launch.active {
      opacity: 1;
      transform: scale(1);
    }

    .launch::after {
      content: "LAUNCHING SCOTT'S SPACE";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.74);
      font-family: "Orbitron", Arial, sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1.38;
      width: min(92vw, 760px);
      text-align: center;
      color: var(--white);
      opacity: 0;
      text-shadow:
        0 0 12px rgba(103, 232, 249, 0.95),
        0 0 30px rgba(59, 130, 246, 0.85);
      transition: opacity 0.22s ease 0.06s, transform 0.6s cubic-bezier(.2,.8,.2,1) 0.06s;
    }

    .launch.active::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Shutdown overlay */
    .shutdown-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(248,113,113,0.14), transparent 22%),
        linear-gradient(135deg, #020617, #0f172a, #000);
      transition: opacity 0.35s ease;
    }

    .shutdown-overlay.active {
      opacity: 1;
    }

    .shutdown-text {
      position: relative;
      z-index: 2;
      width: min(88vw, 700px);
      text-align: center;
      color: white;
      font-family: "Orbitron", Arial, sans-serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1.35;
      text-shadow:
        0 0 12px rgba(255,255,255,0.18),
        0 0 24px rgba(248,113,113,0.22);
    }

    .shutdown-glow,
    .shutdown-flicker {
      position: absolute;
      inset: 0;
    }

    .shutdown-glow {
      background:
        radial-gradient(circle at center, rgba(248,113,113,0.16), transparent 20%);
      opacity: 0;
    }

    .shutdown-overlay.active .shutdown-glow {
      animation: shutdownGlow 1s ease-out forwards;
    }

    @keyframes shutdownGlow {
      0% { opacity: 0; transform: scale(0.5); }
      28% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.65); }
    }

    .shutdown-flicker {
      background: rgba(255,255,255,0.04);
      opacity: 0;
      mix-blend-mode: screen;
    }

    .shutdown-overlay.active .shutdown-flicker {
      animation: shutdownFlicker 0.45s linear 1;
    }

    @keyframes shutdownFlicker {
      0% { opacity: 0; }
      12% { opacity: 0.12; }
      22% { opacity: 0; }
      34% { opacity: 0.08; }
      46% { opacity: 0; }
      60% { opacity: 0.1; }
      100% { opacity: 0; }
    }

    @media (max-width: 760px) {
      .desktop {
        padding: 20px 14px 8px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-content: stretch;
        gap: 14px;
      }

      .icon {
        min-height: 138px;
        border-radius: 20px;
        padding: 12px 10px;
      }

      .badge {
        width: 68px;
        height: 68px;
        border-radius: 22px;
        font-size: 32px;
      }

      .label {
        font-size: 13px;
      }

      .shutdown-wrap {
        padding: 0 0 16px;
      }

      .shutdown-btn {
        padding: 13px 20px;
        font-size: 14px;
      }

      .dock {
        justify-content: flex-start;
      }

      .launch::after {
        width: min(84vw, 360px);
        font-size: 24px;
        letter-spacing: 0.1em;
        line-height: 1.45;
      }

      .shutdown-text {
        width: min(84vw, 360px);
        font-size: 24px;
        letter-spacing: 0.1em;
        line-height: 1.45;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        padding-left: calc(12px + var(--safe-left));
        padding-right: calc(12px + var(--safe-right));
      }

      .top-title {
        font-size: 14px;
      }

      .desktop {
        padding: 18px 12px 6px;
      }

      .grid {
        gap: 12px;
      }

      .icon {
        min-height: 132px;
      }

      .shutdown-btn {
        width: min(88vw, 260px);
        justify-content: center;
      }

      .dock {
        gap: 14px;
        padding: 12px 14px;
      }

      .arrival-status {
        font-size: 22px;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="top-left">
        <div class="status-dot"></div>
        <div class="top-title">Malgieri OS</div>
      </div>
      <div id="clock" class="clock"></div>
    </div>

    <div class="desktop">
      <div class="desktop-inner">

        <div class="status-box">
          <div class="status-title">Jaxson Arrival Status</div>
          <div class="status-content arrival-status">UNBORN</div>
        </div>

        <div class="grid">
          <div id="scott" class="icon">
            <div class="badge">💻</div>
            <div class="label">Scott's Space</div>
          </div>

          <div class="icon">
            <div class="badge">💖</div>
            <div class="label">Courtney's Corner</div>
          </div>

          <div class="icon">
            <div class="badge">🐶</div>
            <div class="label">Obi's Observatory</div>
          </div>

          <div class="icon">
            <div class="badge">🍼</div>
            <div class="label">Jaxson's Journey</div>
          </div>

          <div class="icon">
            <div class="badge">🦴</div>
            <div class="label">Obi Treat</div>
          </div>

          <div class="icon">
            <div class="badge">🎵</div>
            <div class="label">Song Of The Week</div>
          </div>
        </div>

        <div class="shutdown-wrap">
          <button id="shutdownBtn" class="shutdown-btn">
            <span class="shutdown-icon"></span>
            <span>Shut Down</span>
          </button>
        </div>
      </div>
    </div>

    <div class="dock-wrap">
      <div class="dock">
        <span>Apps</span>
        <span>Browser</span>
        <span>Photos</span>
        <span>Music</span>
        <span>Settings</span>
      </div>
    </div>
  </div>

  <div id="launch" class="launch"></div>

  <div id="shutdownOverlay" class="shutdown-overlay">
    <div class="shutdown-glow"></div>
    <div class="shutdown-flicker"></div>
    <div class="shutdown-text">SHUTTING DOWN...</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    const scott = document.getElementById("scott");
    const launch = document.getElementById("launch");
    const shutdownBtn = document.getElementById("shutdownBtn");
    const shutdownOverlay = document.getElementById("shutdownOverlay");

    function resetVisualState() {
      document.body.classList.remove("app-transition", "shutdown-transition");
      launch.classList.remove("active");
      scott.classList.remove("app-launching");
      shutdownOverlay.classList.remove("active");
    }

    function startScottLaunch() {
      document.body.classList.add("app-transition");
      scott.classList.add("app-launching");

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          launch.classList.add("active");

          setTimeout(() => {
            window.location.href = "apps/scott/";
          }, 1200);
        });
      });
    }

    function shutDown() {
      document.body.classList.add("shutdown-transition");
      shutdownOverlay.classList.add("active");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1100);
    }

    scott.addEventListener("click", startScottLaunch);
    shutdownBtn.addEventListener("click", shutDown);

    window.addEventListener("pageshow", (event) => {
      resetVisualState();
      if (event.persisted) {
        requestAnimationFrame(resetVisualState);
      }
    });
  </script>
</body>
</html>
