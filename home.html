<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet" />
  <title>Malgieri OS</title>

  <style>
    :root {
      --bg1: #020617;
      --bg2: #0f172a;
      --bg3: #000000;

      --white: #ffffff;
      --white90: rgba(255, 255, 255, 0.9);
      --white75: rgba(255, 255, 255, 0.75);
      --white70: rgba(255, 255, 255, 0.7);
      --white60: rgba(255, 255, 255, 0.6);
      --white50: rgba(255, 255, 255, 0.5);
      --white10: rgba(255, 255, 255, 0.1);
      --white05: rgba(255, 255, 255, 0.05);

      --cyan: #67e8f9;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: white;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      min-height: 100dvh;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    .app-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: scale(1.01);
      animation: pageIn 0.35s ease forwards;
    }

    @keyframes pageIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .topbar {
      height: calc(52px + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      border-bottom: 1px solid var(--white10);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .top-title {
      font-weight: 700;
      color: var(--white90);
      white-space: nowrap;
    }

    .top-subtitle {
      color: var(--white50);
      font-size: 13px;
      white-space: nowrap;
    }

    .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
      flex-shrink: 0;
    }

    .clock {
      color: var(--white60);
      font-size: 14px;
      white-space: nowrap;
    }

    .desktop {
      flex: 1;
      padding: 24px 18px 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .grid {
      width: 100%;
      max-width: 840px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 132px));
      justify-content: center;
      gap: 24px;
      padding-bottom: 28px;
    }

    .icon {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--white10);
      border-radius: 24px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 156px;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
      text-decoration: none;
      color: inherit;
    }

    .icon:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-4px);
    }

    .badge {
      width: 84px;
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--white10);
      font-size: 40px;
      flex-shrink: 0;
    }

    .label {
      font-size: 15px;
      text-align: center;
      color: var(--white90);
      font-weight: 600;
      line-height: 1.3;
    }

    .dock-wrap {
      position: sticky;
      bottom: 0;
      z-index: 15;
      padding: 10px 12px calc(14px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0));
    }

    .dock {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--white10);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      color: var(--white70);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    .dock::-webkit-scrollbar {
      display: none;
    }

    .launch {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.05);
      background:
        radial-gradient(circle at center, rgba(103, 232, 249, 0.25), transparent 20%),
        radial-gradient(circle at center, rgba(59, 130, 246, 0.18), transparent 40%),
        linear-gradient(135deg, #020617, #0f172a, #000);
      transition: opacity 0.55s ease, transform 0.7s ease;
      overflow: hidden;
    }

    .launch.active {
      opacity: 1;
      transform: scale(1);
    }

    .launch::after {
      content: "LAUNCHING SCOTT'S SPACE";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: "Orbitron", sans-serif;
      font-size: clamp(18px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-align: center;
      width: min(90vw, 700px);
      color: white;
      text-shadow:
        0 0 10px rgba(103, 232, 249, 0.75),
        0 0 24px rgba(59, 130, 246, 0.4),
        0 0 42px rgba(139, 92, 246, 0.2);
      opacity: 0;
      transition: 0.3s 0.2s;
      line-height: 1.35;
    }

    .launch.active::after {
      opacity: 1;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      border: 1px solid rgba(103, 232, 249, 0.28);
      opacity: 0;
      box-shadow:
        0 0 40px rgba(103, 232, 249, 0.14),
        inset 0 0 24px rgba(103, 232, 249, 0.08);
    }

    .launch.active .ring {
      animation: ringExpand 0.8s ease forwards;
    }

    @keyframes ringExpand {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }
      25% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3);
      }
    }

    .pulse {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(103, 232, 249, 0.95), rgba(59, 130, 246, 0.3), transparent 70%);
      filter: blur(2px);
      opacity: 0;
    }

    .launch.active .pulse {
      animation: centerPulse 0.8s ease forwards;
    }

    @keyframes centerPulse {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      25% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(8);
      }
    }

    @media (max-width: 760px) {
      .top-subtitle {
        display: none;
      }

      .desktop {
        padding: 20px 14px 0;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: none;
        gap: 14px;
      }

      .icon {
        min-height: 138px;
        border-radius: 20px;
        padding: 12px 10px;
      }

      .badge {
        width: 68px;
        height: 68px;
        border-radius: 22px;
        font-size: 32px;
      }

      .label {
        font-size: 13px;
      }

      .dock {
        justify-content: flex-start;
      }

      .launch::after {
        letter-spacing: 0.08em;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .desktop {
        padding: 18px 12px 0;
      }

      .grid {
        gap: 12px;
      }

      .icon {
        min-height: 132px;
      }

      .dock {
        gap: 14px;
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="top-left">
        <div class="status"></div>
        <div class="top-title">Malgieri OS</div>
        <div class="top-subtitle">Desktop</div>
      </div>
      <div id="clock" class="clock"></div>
    </div>

    <div class="desktop">
      <div class="grid">
        <div id="scott" class="icon">
          <div class="badge">💻</div>
          <div class="label">Scott's Space</div>
        </div>

        <div class="icon">
          <div class="badge">💖</div>
          <div class="label">Courtney's Corner</div>
        </div>

        <div class="icon">
          <div class="badge">🐶</div>
          <div class="label">Obi's Observatory</div>
        </div>

        <div class="icon">
          <div class="badge">🍼</div>
          <div class="label">Jaxson's Journey</div>
        </div>

        <div class="icon">
          <div class="badge">🦴</div>
          <div class="label">Obi Treat</div>
        </div>
      </div>
    </div>

    <div class="dock-wrap">
      <div class="dock">
        <span>Apps</span>
        <span>Browser</span>
        <span>Photos</span>
        <span>Music</span>
        <span>Settings</span>
      </div>
    </div>
  </div>

  <div id="launch" class="launch">
    <div class="ring"></div>
    <div class="pulse"></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    const scott = document.getElementById("scott");
    const launch = document.getElementById("launch");

    scott.onclick = () => {
      launch.classList.add("active");

      setTimeout(() => {
        window.location.href = "Scott.html";
      }, 900);
    };
  </script>
</body>
</html>
