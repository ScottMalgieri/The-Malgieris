<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#020617" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<title>Malgieri OS</title>

<style>
:root {
  --bg1:#020617;
  --bg2:#0f172a;
  --bg3:#000000;

  --white:#ffffff;
  --white90:rgba(255,255,255,0.9);
  --white75:rgba(255,255,255,0.75);
  --white70:rgba(255,255,255,0.7);
  --white60:rgba(255,255,255,0.6);
  --white50:rgba(255,255,255,0.5);
  --white10:rgba(255,255,255,0.1);
  --white05:rgba(255,255,255,0.05);

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
width:100%;
max-width:100%;
min-height:100%;
overflow-x:hidden;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
font-family:Arial,Helvetica,sans-serif;
color:var(--white);
background:
radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 30%),
linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
}

body{min-height:100dvh;overscroll-behavior:none;}

.app-shell{
min-height:100dvh;
display:flex;
flex-direction:column;
opacity:0;
transform:scale(1.01);
animation:pageIn .35s ease forwards;
transition:filter .5s ease, opacity .5s ease, transform .5s ease;
}

@keyframes pageIn{to{opacity:1;transform:scale(1);}}

body.app-transition .app-shell{
transform:scale(.965);
filter:blur(10px) brightness(.9);
opacity:.72;
}

body.shutdown-transition .app-shell{
filter:blur(8px) brightness(.55);
opacity:.2;
}

.topbar{
height:calc(54px + var(--safe-top));
padding-top:var(--safe-top);
padding-left:calc(16px + var(--safe-left));
padding-right:calc(16px + var(--safe-right));
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--white10);
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
position:sticky;
top:0;
z-index:20;
}

.top-left{display:flex;align-items:center;gap:12px;}

.status-dot{
width:11px;height:11px;border-radius:50%;
background:#4ade80;
box-shadow:0 0 12px #4ade80;
}

.top-title{
font-weight:700;
color:var(--white90);
font-size:15px;
}

.clock{
color:var(--white60);
font-size:14px;
}

/* STATUS PANEL */

.status-panel{
width:100%;
max-width:920px;
margin-bottom:22px;
padding:18px;
border-radius:26px;
background:rgba(255,255,255,0.04);
border:1px solid var(--white10);
backdrop-filter:blur(16px);
box-shadow:0 24px 70px rgba(0,0,0,0.45);
}

.status-title{
text-align:center;
font-size:13px;
letter-spacing:.12em;
color:var(--white60);
margin-bottom:10px;
}

.status-content{
font-size:15px;
line-height:1.5;
color:var(--white90);
outline:none;
}

/* GRID */

.desktop{
flex:1;
padding:24px 18px 10px;
display:flex;
justify-content:center;
align-items:flex-start;
}

.desktop-inner{
width:100%;
max-width:920px;
display:flex;
flex-direction:column;
align-items:center;
}

.grid{
width:100%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,160px));
justify-content:center;
gap:22px;
}

.icon{
min-height:170px;
background:rgba(255,255,255,0.04);
border:1px solid var(--white10);
border-radius:28px;
padding:18px 14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:14px;
cursor:pointer;
transition:.25s;
backdrop-filter:blur(14px);
}

.icon:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.08);
}

.badge{
width:92px;height:92px;
display:flex;
align-items:center;
justify-content:center;
border-radius:30px;
background:rgba(255,255,255,0.1);
border:1px solid var(--white10);
font-size:42px;
}

.label{
font-size:15px;
text-align:center;
color:var(--white90);
font-weight:600;
}

/* SHUTDOWN */

.shutdown-wrap{
width:100%;
display:flex;
justify-content:center;
padding:4px 0 18px;
}

.shutdown-btn{
border:1px solid rgba(248,113,113,0.28);
background:rgba(248,113,113,0.08);
color:var(--white90);
border-radius:999px;
padding:14px 22px;
font-size:15px;
font-weight:600;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:10px;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
backdrop-filter:blur(12px);
}

.shutdown-icon{
width:18px;height:18px;
border:2px solid currentColor;
border-top-color:transparent;
border-radius:50%;
position:relative;
}

.shutdown-icon::before{
content:"";
position:absolute;
left:50%;
top:-5px;
transform:translateX(-50%);
width:2px;height:9px;
background:currentColor;
}

/* DOCK */

.dock-wrap{
position:sticky;
bottom:0;
padding:10px 12px calc(14px + var(--safe-bottom));
background:linear-gradient(to top,rgba(2,6,23,0.95),rgba(2,6,23,0));
}

.dock{
width:min(100%,760px);
margin:0 auto;
padding:12px 16px;
border-radius:999px;
background:rgba(0,0,0,0.4);
border:1px solid var(--white10);
backdrop-filter:blur(12px);
display:flex;
justify-content:center;
color:var(--white70);
}

/* MOBILE */

@media(max-width:760px){
.grid{grid-template-columns:repeat(2,1fr);gap:14px;}
.icon{min-height:138px;border-radius:20px;}
.badge{width:68px;height:68px;font-size:32px;}
}
</style>
</head>

<body>

<div class="app-shell">

<div class="topbar">
<div class="top-left">
<div class="status-dot"></div>
<div class="top-title">Malgieri OS</div>
</div>
<div id="clock" class="clock"></div>
</div>

<div class="desktop">
<div class="desktop-inner">

<div class="status-panel">
<div class="status-title">MALGIERI FAMILY STATUS</div>
<div class="status-content" contenteditable="true">
Family is doing great. Courtney resting. Obi being wild. Jaxson cooking 👶🔥
</div>
</div>

<div class="grid">
<div id="scott" class="icon">
<div class="badge">💻</div>
<div class="label">Scott's Space</div>
</div>

<div class="icon"><div class="badge">💖</div><div class="label">Courtney's Corner</div></div>
<div class="icon"><div class="badge">🐶</div><div class="label">Obi's Observatory</div></div>
<div class="icon"><div class="badge">🍼</div><div class="label">Jaxson's Journey</div></div>
<div class="icon"><div class="badge">🦴</div><div class="label">Obi Treat</div></div>
<div class="icon"><div class="badge">🎵</div><div class="label">Song Of The Week</div></div>
</div>

<div class="shutdown-wrap">
<button id="shutdownBtn" class="shutdown-btn">
<span class="shutdown-icon"></span>
<span>Shut Down</span>
</button>
</div>

</div>
</div>

<div class="dock-wrap">
<div class="dock">The Malgieri Family™</div>
</div>

</div>

<div id="launch" class="launch"></div>

<div id="shutdownOverlay" class="shutdown-overlay">
<div class="shutdown-glow"></div>
<div class="shutdown-flicker"></div>
<div class="shutdown-text">SHUTTING DOWN...</div>
</div>

<script>
function updateClock(){
const now=new Date();
const date=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
const time=now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
document.getElementById("clock").innerText = date + " " + time;
}
updateClock();
setInterval(updateClock,1000);

const scott=document.getElementById("scott");
const launch=document.getElementById("launch");
const shutdownBtn=document.getElementById("shutdownBtn");
const shutdownOverlay=document.getElementById("shutdownOverlay");

function startScottLaunch(){
document.body.classList.add("app-transition");
scott.classList.add("app-launching");
requestAnimationFrame(()=>{
requestAnimationFrame(()=>{
launch.classList.add("active");
setTimeout(()=>{window.location.href="apps/scott/";},1200);
});
});
}

function shutDown(){
document.body.classList.add("shutdown-transition");
shutdownOverlay.classList.add("active");
setTimeout(()=>{window.location.href="index.html";},1100);
}

scott.addEventListener("click",startScottLaunch);
shutdownBtn.addEventListener("click",shutDown);
</script>

</body>
</html>
