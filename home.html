<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#020617">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<title>Malgieri OS</title>

<style>

:root{

--bg1:#020617;
--bg2:#0f172a;
--bg3:#000000;

--white:#ffffff;
--white90:rgba(255,255,255,0.90);
--white70:rgba(255,255,255,0.70);
--white60:rgba(255,255,255,0.60);
--white50:rgba(255,255,255,0.50);
--white10:rgba(255,255,255,0.10);
--white05:rgba(255,255,255,0.05);

--cyan:#67e8f9;

--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);

}

*{

box-sizing:border-box;
-webkit-tap-highlight-color:transparent;

}

html,body{

margin:0;
min-height:100%;

font-family:Arial,Helvetica,sans-serif;

background:

radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 30%),
linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));

color:white;

overflow-x:hidden;

}

body{

min-height:100dvh;

padding-left:var(--safe-left);
padding-right:var(--safe-right);

}

/* top bar */

.topbar{

height:calc(48px + var(--safe-top));

padding-top:var(--safe-top);

display:flex;

align-items:center;
justify-content:space-between;

padding-left:16px;
padding-right:16px;

border-bottom:1px solid var(--white10);

background:rgba(0,0,0,0.35);

backdrop-filter:blur(14px);

}

.top-left{

display:flex;
align-items:center;
gap:10px;

}

.status{

width:10px;
height:10px;

border-radius:50%;

background:#4ade80;

box-shadow:0 0 10px #4ade80;

}

.clock{

color:var(--white60);

}

/* desktop */

.desktop{

padding:28px;

display:flex;
justify-content:center;

}

.grid{

max-width:820px;

display:grid;

grid-template-columns:repeat(auto-fit,130px);

gap:28px;

justify-content:center;

}

.icon{

background:rgba(255,255,255,0.04);

border:1px solid var(--white10);

border-radius:24px;

padding:14px 12px;

display:flex;
flex-direction:column;
align-items:center;

gap:12px;

cursor:pointer;

transition:.2s;

box-shadow:0 24px 70px rgba(0,0,0,0.45);

}

.icon:hover{

background:rgba(255,255,255,0.08);

transform:translateY(-4px);

}

.badge{

width:84px;
height:84px;

display:flex;
align-items:center;
justify-content:center;

border-radius:28px;

background:rgba(255,255,255,0.10);

border:1px solid var(--white10);

font-size:40px;

}

.label{

font-size:15px;

text-align:center;

color:var(--white90);

font-weight:600;

}

/* dock */

.dock{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

padding:14px 22px;

border-radius:999px;

background:rgba(0,0,0,0.4);

border:1px solid var(--white10);

backdrop-filter:blur(12px);

display:flex;
gap:16px;

color:var(--white70);

}

/* launch animation */

.launch{

position:fixed;

inset:0;

z-index:9999;

pointer-events:none;

opacity:0;

transform:scale(1.05);

background:

radial-gradient(circle at center, rgba(103,232,249,0.25), transparent 20%),
radial-gradient(circle at center, rgba(59,130,246,0.18), transparent 40%),
linear-gradient(135deg,#020617,#0f172a,#000);

transition:opacity .55s ease, transform .7s ease;

}

.launch.active{

opacity:1;
transform:scale(1);

}

.launch:after{

content:"LAUNCHING SCOTT'S SPACE";

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-family:"Orbitron",sans-serif;

font-size:clamp(20px,4vw,32px);

font-weight:800;

letter-spacing:0.12em;

text-align:center;

color:white;

text-shadow:

0 0 10px rgba(103,232,249,0.75),
0 0 24px rgba(59,130,246,0.40),
0 0 42px rgba(139,92,246,0.20);

opacity:0;

transition:.3s .2s;

}

.launch.active:after{
opacity:1;
}

.ring{

position:absolute;

left:50%;
top:50%;

width:180px;
height:180px;

border-radius:50%;

transform:translate(-50%,-50%) scale(.7);

border:1px solid rgba(103,232,249,0.28);

opacity:0;

}

.launch.active .ring{
animation:ringExpand .8s ease forwards;
}

@keyframes ringExpand{

0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}

25%{opacity:1;}

100%{opacity:0;transform:translate(-50%,-50%) scale(3);}

}

.pulse{

position:absolute;

left:50%;
top:50%;

width:26px;
height:26px;

border-radius:50%;

transform:translate(-50%,-50%);

background:radial-gradient(circle, rgba(103,232,249,0.95), rgba(59,130,246,0.3), transparent 70%);

filter:blur(2px);

opacity:0;

}

.launch.active .pulse{
animation:centerPulse .8s ease forwards;
}

@keyframes centerPulse{

0%{opacity:0;transform:translate(-50%,-50%) scale(.2);}

25%{opacity:1;}

100%{opacity:0;transform:translate(-50%,-50%) scale(8);}

}

</style>
</head>

<body>

<div class="topbar">

<div class="top-left">

<div class="status"></div>

<strong>Malgieri OS</strong>

</div>

<div id="clock" class="clock"></div>

</div>


<div class="desktop">

<div class="grid">

<div id="scott" class="icon">

<div class="badge">💻</div>

<div class="label">Scott's Space</div>

</div>

<div class="icon">

<div class="badge">💖</div>

<div class="label">Courtney's Corner</div>

</div>

<div class="icon">

<div class="badge">🐶</div>

<div class="label">Obi's Observatory</div>

</div>

<div class="icon">

<div class="badge">🍼</div>

<div class="label">Jaxson's Journey</div>

</div>

<div class="icon">

<div class="badge">🦴</div>

<div class="label">Obi Treat</div>

</div>

</div>

</div>


<div class="dock">

<span>Apps</span>
<span>Browser</span>
<span>Photos</span>
<span>Music</span>
<span>Settings</span>

</div>

<div id="launch" class="launch">

<div class="ring"></div>

<div class="pulse"></div>

</div>

<script>

function updateClock(){

const now=new Date()

document.getElementById("clock").innerText=

now.toLocaleTimeString([],{

hour:"2-digit",
minute:"2-digit"

})

}

updateClock()

setInterval(updateClock,1000)

const scott=document.getElementById("scott")

const launch=document.getElementById("launch")

scott.onclick=()=>{

launch.classList.add("active")

setTimeout(()=>{

window.location.href="Scott.html"

},900)

}

</script>

</body>
</html>
