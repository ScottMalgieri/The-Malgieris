<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Malgieri OS - Scott's Notes</title>

  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --bg-3: #000000;
      --white: #ffffff;
      --white-95: rgba(255,255,255,0.95);
      --white-90: rgba(255,255,255,0.90);
      --white-80: rgba(255,255,255,0.80);
      --white-75: rgba(255,255,255,0.75);
      --white-70: rgba(255,255,255,0.70);
      --white-65: rgba(255,255,255,0.65);
      --white-60: rgba(255,255,255,0.60);
      --white-50: rgba(255,255,255,0.50);
      --white-20: rgba(255,255,255,0.20);
      --white-15: rgba(255,255,255,0.15);
      --white-10: rgba(255,255,255,0.10);
      --green: #4ade80;
      --shadow: 0 24px 70px rgba(0,0,0,0.45);
      --blur: blur(18px);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(168,85,247,0.14), transparent 26%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      color: var(--white);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      min-height: 100dvh;
      opacity: 0;
      transform: scale(1.015);
      animation: pageIn 0.55s ease forwards;
      transition: opacity 0.28s ease, transform 0.28s ease, filter 0.28s ease;
    }

    body.page-leaving {
      opacity: 0;
      transform: scale(0.99);
      filter: blur(4px);
      pointer-events: none;
    }

    body.page-restored {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
    }

    @keyframes pageIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .topbar {
      height: calc(52px + var(--safe-top));
      padding-top: var(--safe-top);
      border-bottom: 1px solid var(--white-10);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.8);
      flex-shrink: 0;
    }

    .muted {
      color: var(--white-50);
      font-size: 14px;
      white-space: nowrap;
    }

    .clock {
      font-size: 14px;
      color: var(--white-75);
      white-space: nowrap;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px calc(28px + var(--safe-bottom));
    }

    .hero {
      border: 1px solid var(--white-10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: var(--blur);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 26px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--white-10);
      background: rgba(255,255,255,0.05);
      color: var(--white-90);
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      margin-bottom: 18px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-2px);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--white-70);
      font-size: 18px;
      line-height: 1.65;
      max-width: 820px;
    }

    .notes-header {
      text-align: center;
      margin: 0 0 18px;
    }

    .notes-header h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: 0.4px;
      color: var(--white-90);
      text-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .notes-panel {
      border: 1px solid var(--white-10);
      background: rgba(255,255,255,0.05);
      backdrop-filter: var(--blur);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-file {
      width: 100%;
      border: 1px solid var(--white-10);
      background: rgba(255,255,255,0.04);
      color: var(--white-90);
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease;
      text-align: left;
    }

    .note-file:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.26),
        0 0 0 1px rgba(255,255,255,0.04);
    }

    .note-file-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .note-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      border: 1px solid var(--white-10);
      background: rgba(255,255,255,0.06);
      font-size: 20px;
      flex-shrink: 0;
    }

    .note-meta-wrap {
      min-width: 0;
    }

    .note-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--white-95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .note-preview {
      color: var(--white-60);
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .note-date {
      color: var(--white-50);
      font-size: 13px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .note-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        calc(18px + var(--safe-top))
        calc(18px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(18px + var(--safe-left));
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(10px);
      z-index: 200;
    }

    .note-modal.open {
      display: flex;
    }

    .note-window {
      width: min(900px, 100%);
      max-height: min(85dvh, 900px);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.58);
      border: 1px solid rgba(0,0,0,0.35);
      background: #e9e9e9;
      color: #111111;
      display: flex;
      flex-direction: column;
    }

    .note-window-topbar {
      height: 34px;
      background: linear-gradient(180deg, #f7f7f7 0%, #dadada 100%);
      border-bottom: 1px solid #b6b6b6;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    .note-window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .note-window-dot.red { background: #ff5f57; }
    .note-window-dot.yellow { background: #ffbd2f; }
    .note-window-dot.green { background: #28c840; }

    .note-window-titlebar {
      background: #f2f2f2;
      border-bottom: 1px solid #cfcfcf;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .note-window-title {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-close-btn {
      border: 1px solid #bdbdbd;
      background: #f9f9f9;
      color: #111;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .note-close-btn:hover {
      background: #ececec;
    }

    .note-window-menu {
      background: #fafafa;
      border-bottom: 1px solid #d7d7d7;
      padding: 6px 12px;
      color: #444;
      font-size: 13px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .note-paper {
      background:
        repeating-linear-gradient(
          to bottom,
          #ffffff 0px,
          #ffffff 29px,
          #d9e8ff 30px
        );
      min-height: 420px;
      overflow: auto;
      padding: 18px 22px 26px 62px;
      position: relative;
      font-family: "Courier New", Courier, monospace;
      font-size: 17px;
      line-height: 30px;
      color: #121212;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-paper::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 42px;
      width: 2px;
      background: rgba(255, 82, 82, 0.45);
    }

    .note-footer {
      border-top: 1px solid #d2d2d2;
      background: #f6f6f6;
      padding: 8px 12px;
      color: #555;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    @media (max-width: 860px) {
      .note-file {
        align-items: flex-start;
      }

      .note-date {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .topbar-left strong {
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .muted,
      .clock {
        font-size: 12px;
      }

      .page-wrap {
        padding: 20px 14px calc(22px + var(--safe-bottom));
      }

      .hero {
        padding: 22px 18px;
        border-radius: 24px;
      }

      .hero h1 {
        font-size: clamp(30px, 11vw, 42px);
      }

      .hero p {
        font-size: 16px;
      }

      .notes-header h2 {
        font-size: clamp(26px, 9vw, 34px);
      }

      .notes-panel {
        padding: 12px;
        border-radius: 22px;
      }

      .note-file {
        padding: 14px;
        border-radius: 16px;
      }

      .note-name {
        font-size: 16px;
      }

      .note-preview {
        font-size: 13px;
      }

      .note-window {
        max-height: min(88dvh, 900px);
        border-radius: 16px;
      }

      .note-window-menu {
        gap: 12px;
        font-size: 12px;
      }

      .note-paper {
        padding: 16px 16px 22px 54px;
        font-size: 15px;
        line-height: 28px;
      }

      .note-paper::before {
        left: 36px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="status-dot"></span>
      <strong>Scott's Notes</strong>
      <span class="muted">Malgieri OS Folder</span>
    </div>
    <div class="topbar-right">
      <span class="muted">Notes</span>
      <span class="muted">•</span>
      <span id="clock" class="clock">--:--</span>
    </div>
  </header>

  <main class="page-wrap">
    <section class="hero">
      <a href="/apps/scott/" class="back-btn smooth-link">← Back To Scott’s Space</a>
      <h1>Scott’s Notes</h1>
      <p>
        A clean little notes section that gives insight to my thoughts and things I write down.<br>
    </section>

    <div class="notes-header">
      <h2>Text Files</h2>
    </div>

    <section class="notes-panel">
      <div class="notes-list">

        <button class="note-file" onclick="openNote('day')">
          <div class="note-file-left">
            <div class="note-icon">📝</div>
            <div class="note-meta-wrap">
              <div class="note-name">Scotts-Day.txt</div>
              <div class="note-preview">A quick daily journal entry with thoughts, wins, and random life stuff...</div>
            </div>
          </div>
          <div class="note-date">03-18-2026</div>
        </button>

        <button class="note-file" onclick="openNote('ideas')">
          <div class="note-file-left">
            <div class="note-icon">💡</div>
            <div class="note-meta-wrap">
              <div class="note-name">Ideas.txt</div>
              <div class="note-preview">Site upgrades, future features, random late-night ideas, and cool build concepts...</div>
            </div>
          </div>
          <div class="note-date">03-18-2026</div>
        </button>

        <button class="note-file" onclick="openNote('dadthoughts')">
          <div class="note-file-left">
            <div class="note-icon">👶</div>
            <div class="note-meta-wrap">
              <div class="note-name">Dad-Thoughts.txt</div>
              <div class="note-preview">Thoughts about fatherhood, excitement, nerves, goals, and future memories...</div>
            </div>
          </div>
          <div class="note-date">03-18-2026</div>
        </button>

        <button class="note-file" onclick="openNote('goals')">
          <div class="note-file-left">
            <div class="note-icon">🎯</div>
            <div class="note-meta-wrap">
              <div class="note-name">Goals.txt</div>
              <div class="note-preview">Fitness goals, money goals, family goals, and what you are building toward...</div>
            </div>
          </div>
          <div class="note-date">03-18-2026</div>
        </button>

        <button class="note-file" onclick="openNote('random')">
          <div class="note-file-left">
            <div class="note-icon">⚡</div>
            <div class="note-meta-wrap">
              <div class="note-name">Random-Thoughts.txt</div>
              <div class="note-preview">Stuff that pops into your head, funny lines, quotes, and chaotic brain sparks...</div>
            </div>
          </div>
          <div class="note-date">03-18-2026</div>
        </button>

      </div>
    </section>
  </main>

  <div id="noteModal" class="note-modal" aria-hidden="true">
    <div class="note-window" role="dialog" aria-modal="true" aria-labelledby="noteWindowTitle">
      <div class="note-window-topbar">
        <span class="note-window-dot red"></span>
        <span class="note-window-dot yellow"></span>
        <span class="note-window-dot green"></span>
      </div>

      <div class="note-window-titlebar">
        <div id="noteWindowTitle" class="note-window-title">note.txt - Notepad</div>
        <button class="note-close-btn" onclick="closeNote()">Close</button>
      </div>

      <div class="note-window-menu">
        <span>File</span>
        <span>Edit</span>
        <span>Format</span>
        <span>View</span>
        <span>Help</span>
      </div>

      <div id="notePaper" class="note-paper"></div>

      <div class="note-footer">
        <span id="noteFooterName">note.txt</span>
        <span>Ln 1, Col 1</span>
      </div>
    </div>
  </div>

  <script>
    const notes = {
      day: {
        title: "Scotts-Day.txt",
        content: `Today was a solid day.

Worked on Malgieri OS and started getting the notes section together.
Scott's Pictures is finally in a good place and actually feels real now.

Trying to keep building one page at a time instead of overthinking everything.

Overall mood:
Focused.
Motivated.
A little tired.
Still locked in.`
      },
      ideas: {
        title: "Ideas.txt",
        content: `- Add draggable note windows later
- Add a typing effect for opening files
- Create Scott's Setup page
- Add Obi folder
- Add Jaxson memories folder
- Maybe add fake desktop notifications
- Build a blog/browser page inside Scott's Space`
      },
      dadthoughts: {
        title: "Dad-Thoughts.txt",
        content: `Becoming a dad still feels surreal.

Part of me is unbelievably excited.
Part of me is nervous.
But more than anything, I want to be present.

I want Jaxson to know his dad loves him, shows up, and gives everything he has.

That's the mission.`
      },
      goals: {
        title: "Goals.txt",
        content: `- Be a great husband
- Be the best dad possible
- Keep building Malgieri OS
- Lock in financially
- Keep improving physically
- Stay consistent
- Build a life I am proud of`
      },
      random: {
        title: "Random-Thoughts.txt",
        content: `Things I randomly think about:

Why do late-night ideas always hit harder?
Why does building stuff like this feel so addicting?
Ghost Strawbango is elite.
Obi is insane.
This OS is actually getting fire.`
      }
    };

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function openNote(noteKey) {
      const note = notes[noteKey];
      if (!note) return;

      document.getElementById("noteWindowTitle").textContent = `${note.title} - Notepad`;
      document.getElementById("noteFooterName").textContent = note.title;
      document.getElementById("notePaper").textContent = note.content;

      const modal = document.getElementById("noteModal");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeNote() {
      const modal = document.getElementById("noteModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    document.getElementById("noteModal").addEventListener("click", function (e) {
      if (e.target === this) {
        closeNote();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeNote();
      }
    });

    updateClock();
    setInterval(updateClock, 1000);

    document.querySelectorAll(".smooth-link").forEach((link) => {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        if (!href || href === "#" || href.startsWith("javascript:")) return;

        e.preventDefault();
        document.body.classList.remove("page-restored");
        document.body.classList.add("page-leaving");

        setTimeout(() => {
          window.location.href = href;
        }, 240);
      });
    });

    window.addEventListener("pageshow", function (event) {
      document.body.classList.remove("page-leaving");

      if (event.persisted) {
        document.body.classList.add("page-restored");
      } else {
        document.body.classList.remove("page-restored");
      }
    });

    window.addEventListener("popstate", function () {
      document.body.classList.remove("page-leaving");
      document.body.classList.add("page-restored");
    });
  </script>
</body>
</html>
